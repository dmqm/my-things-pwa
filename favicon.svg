<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- iOS Warm Yellow-Orange Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD60A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#7A3E00" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Solid Background covering 100% of the view box to prevent PWA maskable black borders -->
  <rect width="512" height="512" fill="url(#grad1)" />
  
  <!-- Icon Graphics (Minimalist White Storage Box - isometric view) -->
  <g filter="url(#shadow)" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box Lid Top Plane -->
    <path d="M130 190 L256 120 L382 190 L256 260 Z" fill="rgba(255, 255, 255, 0.12)" />
    <!-- Box Lid Outer Border (adds thickness) -->
    <path d="M130 190 L130 205 L256 275 L382 205 L382 190" />
    <!-- Box Body Front Left Plane -->
    <path d="M142 220 L142 340 C142 370, 160 380, 190 382 L256 390 L256 270" />
    <!-- Box Body Front Right Plane -->
    <path d="M370 220 L370 340 C370 370, 352 380, 322 382 L256 390" />
    
    <!-- Decorative Document Card in the box -->
    <path d="M220 230 L292 190 L292 240 L220 280 Z" fill="#ffffff" stroke="none" opacity="0.85" />
  </g>
</svg>